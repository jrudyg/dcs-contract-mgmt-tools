<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>In-Process Contracts</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#ffffff;--surface2:#f7f8fa;--surface3:#eef0f3;
  --border:#dde1e8;--border2:#eaecf0;
  --text:#111827;--text2:#374151;--text3:#6b7280;--text4:#9ca3af;
  --blue:#2563eb;--blue-soft:#eff6ff;--blue-border:#93c5fd;
  --green:#059669;--green-bg:#d1fae5;--green-text:#065f46;
  --amber:#b45309;--amber-bg:#fef3c7;--amber-text:#78350f;
  --red:#dc2626;--red-bg:#fee2e2;--red-text:#991b1b;
  --radius:6px;--radius-lg:10px;--radius-xl:14px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
body.dark{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--surface3:#21262d;
  --border:#30363d;--border2:#21262d;
  --text:#e6edf3;--text2:#c9d1d9;--text3:#8b949e;--text4:#484f58;
  --blue:#58a6ff;--blue-soft:#0d1b2e;--blue-border:#388bfd;
  --green-bg:#033a20;--green-text:#56d364;
  --amber-bg:#2d1b00;--amber-text:#e3b341;
  --red-bg:#2d0f0f;--red-text:#ff7b72;
  --shadow:0 1px 3px rgba(0,0,0,.3);
  --shadow-md:0 4px 12px rgba(0,0,0,.4);
}

/* ── Header ── */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;height:54px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:200;
  box-shadow:var(--shadow);
}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;letter-spacing:-.2px}
.logo-mark{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{color:#fff}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-pill{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap}

/* ── Icon buttons ── */
.icon-btn{width:32px;height:32px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;font-size:14px}
.icon-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.icon-btn.active{background:var(--blue-soft);border-color:var(--blue-border);color:var(--blue)}

/* ── Tabs ── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;position:sticky;top:54px;z-index:190}
.tab{padding:11px 16px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab svg{width:14px;height:14px;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab.manage-tab{margin-left:auto}
.tab.manage-tab.locked{color:var(--text3)}
.tab.manage-tab.unlocked{color:var(--amber)}

/* ── Main ── */
main{max-width:1400px;margin:0 auto;padding:20px 24px}

/* ── Stat cards ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;box-shadow:var(--shadow)}
.stat-card.clickable{cursor:pointer;transition:border-color .15s,box-shadow .15s}
.stat-card.clickable:hover{border-color:var(--blue);box-shadow:var(--shadow-md)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:5px}
.stat-value{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--text);line-height:1}
.stat-value.green{color:var(--green)}
.stat-value.amber{color:var(--amber)}
.stat-value.red{color:var(--red)}

/* ── Search bar ── */
.search-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.search-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.search-wrap{position:relative;flex:1}
.search-wrap .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text4);pointer-events:none}
input[type=text]{width:100%;padding:8px 32px 8px 34px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;font-family:inherit}
input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.clear-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:17px;height:17px;border-radius:50%;border:none;background:var(--text4);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.clear-x.show{display:flex}

/* ── Filter chips ── */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-group{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.filter-label{font-size:11px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1.6}
.chip:hover{border-color:var(--blue-border);color:var(--blue);background:var(--blue-soft)}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── Table ── */
.table-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.table-meta{padding:9px 14px;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th.no-sort{cursor:default}
td{padding:7px 10px;border-bottom:1px solid var(--border2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer}
tr:hover td{background:var(--surface2)}
.sort-icon{opacity:.3;font-size:9px;margin-left:2px}
.sort-icon.on{opacity:1;color:var(--blue)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap;line-height:1.5}
.b-nda{background:#dbeafe;color:#1e40af}.b-mnda{background:#d1fae5;color:#065f46}
.b-msa{background:#fef3c7;color:#92400e}.b-sow{background:#ede9fe;color:#5b21b6}
.b-sub{background:#fee2e2;color:#991b1b}.b-cda,.b-other{background:var(--surface3);color:var(--text2)}
.b-eula,.b-ipa,.b-psa{background:#fce7f3;color:#9d174d}.b-amendment{background:#ffedd5;color:#9a3412}
body.dark .b-nda{background:#0d2447;color:#93c5fd}
body.dark .b-mnda{background:#023320;color:#56d364}
body.dark .b-msa{background:#2d1b00;color:#e3b341}
body.dark .b-sow{background:#1a0e3d;color:#c4b5fd}
body.dark .b-sub{background:#2d0f0f;color:#ff7b72}
body.dark .b-cda,body.dark .b-other{background:var(--surface3);color:var(--text3)}

/* ── Position / leverage / stage pills ── */
.pos-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.pos-AGGRESSIVE{background:var(--red-bg);color:var(--red-text)}
.pos-BALANCED{background:var(--blue-soft);color:var(--blue)}
.pos-ACCOMMODATING{background:var(--green-bg);color:var(--green-text)}
.pos-default{background:var(--surface3);color:var(--text3)}
.stage-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--surface3);color:var(--text2);white-space:nowrap}

/* ── Empty state ── */
.empty-state{text-align:center;padding:56px 20px;color:var(--text4)}
.empty-state svg{opacity:.25;margin-bottom:14px}
.empty-state h3{font-size:15px;font-weight:600;color:var(--text3);margin-bottom:6px}
.empty-state p{font-size:13px}

/* ── Placeholder panels (Stages 3 & 4) ── */
.placeholder{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius-lg);padding:48px 20px;text-align:center;color:var(--text4);box-shadow:var(--shadow)}
.placeholder h3{font-size:15px;font-weight:600;color:var(--text3);margin-bottom:6px}
.placeholder p{font-size:13px}

/* ── Responsive ── */
@media(max-width:900px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  main{padding:12px}
}

/* ── Print ── */
@media print{
  header,.tabs,.search-block,.hdr-right{display:none!important}
  main{padding:0}
  body{background:#fff;color:#000}
}

/* ── Detail drawer (Stage 2) ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s;z-index:300}
.drawer-overlay.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;height:100vh;width:520px;max-width:94vw;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-md);transform:translateX(100%);transition:transform .25s ease;z-index:301;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.drawer-hdr-main{min-width:0}
.drawer-hdr-title{font-size:16px;font-weight:700;letter-spacing:-.2px;color:var(--text);margin-bottom:6px;overflow-wrap:anywhere}
.drawer-hdr-sub{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.drawer-close{flex-shrink:0;width:30px;height:30px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.drawer-close:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.drawer-body{padding:18px 20px;overflow-y:auto;flex:1}
.drawer-section{margin-bottom:22px}
.drawer-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:10px}
.drawer-empty{font-size:13px;color:var(--text4);padding:8px 0;line-height:1.6}

/* BATNA banner */
.batna-banner{border-radius:var(--radius-lg);padding:12px 14px;border:1px solid var(--border)}
.batna-strength{font-size:13px;font-weight:700;margin-bottom:3px}
.batna-note{font-size:12px;line-height:1.5;opacity:.9}
.batna-Strong{background:var(--green-bg);color:var(--green-text);border-color:transparent}
.batna-Balanced{background:var(--blue-soft);color:var(--blue);border-color:var(--blue-border)}
.batna-Weak{background:var(--amber-bg);color:var(--amber-text);border-color:transparent}
.batna-default{background:var(--surface2);color:var(--text2)}

/* Rounds timeline */
.round-item{position:relative;padding:0 0 14px 22px;border-left:1px solid var(--border);margin-left:5px}
.round-item:last-child{border-left-color:transparent;padding-bottom:0}
.round-dot{position:absolute;left:-5px;top:2px;width:10px;height:10px;border-radius:50%;border:2px solid var(--surface)}
.round-dot.sent{background:var(--blue)}
.round-dot.received{background:var(--amber)}
.round-top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.round-n{font-size:12px;font-weight:700;color:var(--text)}
.round-dir{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:1px 6px;border-radius:3px}
.round-dir.sent{background:var(--blue-soft);color:var(--blue)}
.round-dir.received{background:var(--amber-bg);color:var(--amber-text)}
.round-date{font-size:11px;color:var(--text4)}
.round-obj{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:2px}
.round-note{font-size:12px;color:var(--text3);line-height:1.5}
.round-file{font-size:11px;font-family:monospace;color:var(--text4);margin-top:2px;overflow-wrap:anywhere}

/* Objectives register */
.obj-tier-hdr{font-size:12px;font-weight:700;color:var(--text2);margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.obj-tier-hdr:first-child{margin-top:0}
.obj-tier-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.04em}
.obj-tier-T1{background:var(--red-bg);color:var(--red-text)}
.obj-tier-T2{background:var(--amber-bg);color:var(--amber-text)}
.obj-tier-T3{background:var(--green-bg);color:var(--green-text)}
.obj-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:6px;border-left-width:3px}
.obj-row.tier-T1{border-left-color:var(--red)}
.obj-row.tier-T2{border-left-color:var(--amber)}
.obj-row.tier-T3{border-left-color:var(--green)}
.obj-main{flex:1;min-width:0}
.obj-risk{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.obj-goal{font-size:12px;color:var(--text3);line-height:1.5}
.obj-goal .arrow{color:var(--text4);margin-right:4px}
.obj-ref{font-size:10px;font-family:monospace;color:var(--text4);margin-top:3px}
.obj-right{flex-shrink:0}
.outcome-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.03em;white-space:nowrap}
.outcome-PENDING{background:var(--amber-bg);color:var(--amber-text)}
.outcome-WON,.outcome-MUTUAL{background:var(--green-bg);color:var(--green-text)}
.outcome-ACCEPTED{background:var(--blue-soft);color:var(--blue)}
.outcome-LOST{background:var(--red-bg);color:var(--red-text)}
.outcome-default{background:var(--surface3);color:var(--text3)}

/* ── Drawer action forms (Stage 3b) ── */
.drawer-actions-section{border-top:1px solid var(--border);padding-top:16px}
.drawer-action-btns{display:flex;gap:8px;flex-wrap:wrap}
.drawer-action-form{border-top:1px solid var(--border2);margin-top:12px;padding-top:12px}
.drawer-action-form .form-grid{grid-template-columns:1fr}
.drawer-action-form .form-grid.two{grid-template-columns:1fr 1fr}

/* ── Folders & Files tree (Stage 3) ── */
.folder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.folder-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.folder-hdr:hover{background:var(--surface2)}
.folder-caret{flex-shrink:0;color:var(--text4);transition:transform .15s;font-size:11px}
.folder-card.open .folder-caret{transform:rotate(90deg)}
.folder-ic{flex-shrink:0;color:var(--amber)}
.folder-meta{flex:1;min-width:0}
.folder-name{font-size:14px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-cp{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-count{font-size:11px;color:var(--text4);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 8px;white-space:nowrap}
.folder-open-link{font-size:11px;color:var(--blue);text-decoration:none;white-space:nowrap;flex-shrink:0}
.folder-open-link:hover{text-decoration:underline}
.folder-body{display:none;padding:4px 14px 12px 14px;border-top:1px solid var(--border2)}
.folder-card.open .folder-body{display:block}
.subfolder{margin-top:10px}
.subfolder-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);display:flex;align-items:center;gap:6px;margin-bottom:5px}
.subfolder-hdr .sf-ic{color:var(--text4)}
.file-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:var(--radius);font-size:12px}
.file-row:hover{background:var(--surface2)}
.file-name{flex:1;min-width:0;font-family:monospace;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-empty{font-size:11px;color:var(--text4);font-style:italic;padding:4px 8px}

/* ── Tools / action cards (Stage 3) ── */
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);max-width:680px}
.action-card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.action-card-sub{font-size:13px;color:var(--text3);margin-bottom:16px;line-height:1.5}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.form-field input,.form-field select{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text);outline:none;font-family:inherit;width:100%}
.form-field input:focus,.form-field select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.btn-primary{padding:9px 18px;border-radius:var(--radius);border:none;background:var(--blue);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary:hover{opacity:.9}

/* ── CC relay output (reused from index.html styling) ── */
.relay-output{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:320px;overflow-y:auto;line-height:1.6;color:var(--text2);margin-top:14px}
.relay-copy-btn{margin-top:8px;display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2)}
.relay-copy-btn:hover{border-color:var(--blue);color:var(--blue)}
.relay-mode-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:var(--blue-soft);color:var(--blue);margin-left:8px}

/* ── Header cross-link (Stage 4) ── */
.hdr-link{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-soft);border:1px solid var(--blue-border);border-radius:20px;padding:3px 10px;text-decoration:none;white-space:nowrap}
.hdr-link:hover{background:var(--blue);color:#fff}

/* ── Manage tab (Stage 4) ── */
.tab.manage-tab.unlocked .manage-lbl{color:var(--amber)}
.manage-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.manage-section-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.manage-section-sub{font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.5}
.manage-danger{border-color:rgba(220,38,38,.4)}
.btn-danger{padding:9px 18px;border-radius:var(--radius);border:1px solid var(--red);background:var(--surface);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-danger:hover{background:var(--red-bg)}
.bulk-rows{max-height:260px;overflow-y:auto;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 8px;margin-bottom:12px}
.bulk-rows label{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:4px;font-size:13px;cursor:pointer}
.bulk-rows label:hover{background:var(--surface2)}
.bulk-rows input[type=checkbox]{accent-color:var(--blue);width:14px;height:14px}

/* ── Admin login modal (copied from index.html) ── */
#admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
#admin-overlay.show{display:flex}
.admin-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px;width:360px;max-width:92vw;box-shadow:var(--shadow-md)}
.admin-modal h3{font-size:17px;font-weight:700;margin-bottom:4px}
.admin-modal p{font-size:13px;color:var(--text3);margin-bottom:20px}
.admin-modal input[type=password]{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:14px;background:var(--surface2);color:var(--text);margin-bottom:8px;font-family:inherit;outline:none}
.admin-modal input[type=password]:focus{border-color:var(--blue)}
.modal-err{color:var(--red);font-size:12px;margin-bottom:10px;display:none}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{padding:8px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-btn-primary{background:var(--blue);color:#fff;border:none}
.modal-btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

/* ── Footer ── */
.footer-note{font-size:11px;color:var(--text4);text-align:right;margin-top:8px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    </div>
    In-Process Contracts
  </div>
  <div class="hdr-right">
    <span class="hdr-pill" id="hdr-pill">Loading…</span>
    <a class="hdr-link" href="index.html" title="Open the main Contract Catalog">Catalog ↗</a>
    <button class="icon-btn" id="theme-btn" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="pipeline" onclick="switchTab('pipeline')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
    Pipeline
  </button>
  <button class="tab" data-tab="folders" onclick="switchTab('folders')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
    Folders &amp; Files
  </button>
  <button class="tab" data-tab="tools" onclick="switchTab('tools')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
    Tools
  </button>
  <button class="tab manage-tab locked" id="manage-tab" data-tab="manage" onclick="handleManageClick()">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    <span class="manage-lbl" id="manage-tab-label">Manage</span>
  </button>
</nav>

<main>

  <!-- ══ PIPELINE TAB ══ -->
  <div id="tab-pipeline">
    <div class="stats-row" id="stats-row"></div>

    <div class="search-block">
      <div class="search-row">
        <div class="search-wrap">
          <svg class="s-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="q" placeholder="Search counterparty or filename… (press / to focus)" oninput="onSearch()" aria-label="Search">
          <button class="clear-x" id="clear-x" onclick="clearSearch()" title="Clear">✕</button>
        </div>
      </div>
      <div class="filter-row" id="filter-bar"></div>
    </div>

    <div class="table-block">
      <div class="table-meta">
        <span id="tbl-meta"></span>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr id="thead-row"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="empty-state" class="empty-state" style="display:none">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
        <h3>No in-process contracts found</h3>
        <p id="empty-msg">Try adjusting your filters or search term.</p>
      </div>
    </div>
    <p class="footer-note" id="footer-note"></p>
  </div>

  <!-- ══ FOLDERS & FILES TAB ══ -->
  <div id="tab-folders" style="display:none">
    <!-- Stage 3: tree derived from CATALOG, rendered by renderFolders() -->
    <div id="folders-content"></div>
  </div>

  <!-- ══ TOOLS TAB ══ -->
  <div id="tab-tools" style="display:none">
    <!-- Stage 3: action cards, rendered by renderTools() -->
    <div id="tools-content"></div>
  </div>

  <!-- ══ MANAGE TAB (Stage 4 — SHA-256 gated) ══ -->
  <div id="tab-manage" style="display:none">
    <!-- Populated by renderManage() once unlocked -->
    <div id="manage-content"></div>
  </div>

</main>

<!-- ── Admin login modal (copied from index.html) ── -->
<div id="admin-overlay">
  <div class="admin-modal">
    <h3>🔒 Manage Access</h3>
    <p>Enter the owner password to access in-process management tools.</p>
    <input type="password" id="admin-pwd" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()">
    <div class="modal-err" id="modal-err">Incorrect password. Try again.</div>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeAdminLogin()">Cancel</button>
      <button class="modal-btn-primary" onclick="adminLogin()">Unlock</button>
    </div>
  </div>
</div>

<!-- ══ DETAIL DRAWER (Stage 2) ══ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Contract detail">
  <div class="drawer-hdr">
    <div class="drawer-hdr-main">
      <div class="drawer-hdr-title" id="drawer-title">—</div>
      <div class="drawer-hdr-sub" id="drawer-sub"></div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()" title="Close" aria-label="Close">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<script>
// ══════════════════════════════════════════════
// NEGOTIATION STAGES
// ══════════════════════════════════════════════
const STAGES = [
  '1-Request',
  '2-Context',
  '3-RiskReview',
  '4-Redline',
  '5-Negotiate',
  '6-FinalReview',
  '7-Approval',
  '8-Execution',
  '9-Handoff'
];

// ══════════════════════════════════════════════
// DATA & STATE
// ══════════════════════════════════════════════
let CATALOG = [];        // rows from in-process-catalog.csv
let DETAIL  = {};        // keyed by FilePath, from in-process-detail.json
let filtered = [];
let sortField = 'CounterpartyName', sortDir = 1;
let af = { stage:'All', position:'All', leverage:'All' };

// SharePoint base URL — points at the In-Process document library (05-In-Process).
const SP_BASE = 'https://diakoniagroupllc.sharepoint.com/sites/ContractManagement/Shared%20Documents/05-In-Process';

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
const DT_CLASS = {NDA:'b-nda',MNDA:'b-mnda',MSA:'b-msa',SOW:'b-sow',Subcontract:'b-sub',CDA:'b-cda',EULA:'b-eula',IPA:'b-ipa',PSA:'b-psa',Amendment:'b-amendment',Other:'b-other'};

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function badge(t,c){ return `<span class="badge ${c}">${esc(t)}</span>`; }
// CSV field quoting: wrap + double-up quotes only when the value contains a comma, quote, or newline.
function csvCell(v){ const s=String(v==null?'':v); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }

function posPill(p){
  const k=(p||'').toUpperCase();
  const cls=['AGGRESSIVE','BALANCED','ACCOMMODATING'].includes(k)?'pos-'+k:'pos-default';
  return p?`<span class="pos-pill ${cls}">${esc(p)}</span>`:'—';
}
function stagePill(s){ return s?`<span class="stage-pill">${esc(s)}</span>`:'—'; }

// SharePoint URL builder (same pattern as index.html), pointed at the in-process library.
// SP_BASE already ends in "05-In-Process", so strip a leading "05-In-Process/" from the
// FilePath to avoid doubling that segment.
function spUrl(r){
  let fp = r.FilePath || (r.VendorFolder+'/'+r.Filename);
  fp = fp.replace(/^05-In-Process\//,'');
  return SP_BASE+'/'+fp.split('/').map(s=>encodeURIComponent(s||'')).join('/')+'?web=1';
}

// Rows that should appear in the pipeline.
// Production: hide all _-prefixed folders (templates, fixtures).
function getVisible(){
  return CATALOG.filter(r=>{
    const vf = r.VendorFolder||'';
    if(vf.startsWith('_')) return false;
    return true;
  });
}

// ══════════════════════════════════════════════
// DARK MODE
// ══════════════════════════════════════════════
function toggleDark(){
  const d = document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent = d ? '☀️' : '🌙';
  try{localStorage.setItem('cm-theme',d?'dark':'light')}catch(e){}
}
(function(){
  let saved; try{saved=localStorage.getItem('cm-theme')}catch(e){}
  const pref = window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  if(saved==='dark'||(saved===null&&pref)){document.body.classList.add('dark');document.getElementById('theme-btn').textContent='☀️';}
})();

// ══════════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['pipeline','folders','tools','manage'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
  });
  if(tab==='folders') renderFolders();
  if(tab==='tools')   renderTools();
  if(tab==='manage' && adminUnlocked) renderManage();
}

// ══════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════
function buildStats(){
  const rows = getVisible();
  const total = rows.length;
  const stages = new Set(rows.map(r=>r.Stage).filter(Boolean));
  // T1 objectives open: across DETAIL where tier=T1 and outcome=PENDING (guard empty)
  let t1open = 0;
  Object.keys(DETAIL||{}).forEach(fp=>{
    const objs = (DETAIL[fp] && DETAIL[fp].objectives) || [];
    objs.forEach(o=>{ if(o && o.tier==='T1' && o.outcome==='PENDING') t1open++; });
  });
  document.getElementById('stats-row').innerHTML = [
    {label:'Total In-Process',value:total.toLocaleString(),cls:''},
    {label:'Stages',value:stages.size.toLocaleString(),cls:''},
    {label:'T1 Objectives Open',value:t1open.toLocaleString(),cls:t1open>0?'amber':''},
  ].map(s=>`<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value ${s.cls}">${s.value}</div></div>`).join('');
}

// ══════════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════════
function distinct(field){ return [...new Set(getVisible().map(r=>r[field]).filter(Boolean))].sort(); }

function buildFilters(){
  function group(label,key,vals){
    let h=`<div class="filter-group"><span class="filter-label">${label}</span>`;
    h+=`<button class="chip${af[key]==='All'?' active':''}" onclick="setAf('${key}','All')">All</button>`;
    h+=vals.map(v=>`<button class="chip${af[key]===v?' active':''}" onclick="setAf('${key}','${esc(v)}')">${esc(v)}</button>`).join('');
    h+='</div>';
    return h;
  }
  document.getElementById('filter-bar').innerHTML =
    group('Stage','stage',distinct('Stage')) +
    group('Position','position',distinct('Position')) +
    group('Leverage','leverage',distinct('Leverage'));
}
function setAf(k,v){ af[k]=v; buildFilters(); go(); }

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
function onSearch(){
  const q = document.getElementById('q').value;
  document.getElementById('clear-x').classList.toggle('show',q.length>0);
  go();
}
function clearSearch(){ document.getElementById('q').value=''; document.getElementById('clear-x').classList.remove('show'); go(); }

// ══════════════════════════════════════════════
// SORT
// ══════════════════════════════════════════════
function sortBy(f){ sortField===f?sortDir*=-1:(sortField=f,sortDir=1); go(); }

const COLUMNS = [
  {label:'Counterparty',field:'CounterpartyName',w:'20%',sort:true},
  {label:'Type',field:'DocType',w:'9%',sort:true},
  {label:'Stage',field:'Stage',w:'12%',sort:true},
  {label:'Position',field:'Position',w:'12%',sort:true},
  {label:'Leverage',field:'Leverage',w:'12%',sort:true},
  {label:'Round',field:'Round',w:'7%',sort:true},
  {label:'Owner',field:'Owner',w:'10%',sort:true},
  {label:'Last Activity',field:'LastActivity',w:'12%',sort:true},
];

function renderThead(){
  document.getElementById('thead-row').innerHTML = COLUMNS.map(c=>
    `<th style="width:${c.w}" class="${c.sort?'':'no-sort'}" ${c.sort?`onclick="sortBy('${c.field}')"`:''}>${c.label}${c.sort?`<span class="sort-icon${sortField===c.field?' on':''}"> ${sortField===c.field?(sortDir===1?'▲':'▼'):'↕'}</span>`:''}</th>`
  ).join('');
}

// ══════════════════════════════════════════════
// MAIN FILTER + RENDER
// ══════════════════════════════════════════════
function go(){
  const q = (document.getElementById('q').value||'').trim().toLowerCase();
  filtered = getVisible().filter(r=>{
    if(af.stage!=='All'&&r.Stage!==af.stage) return false;
    if(af.position!=='All'&&r.Position!==af.position) return false;
    if(af.leverage!=='All'&&r.Leverage!==af.leverage) return false;
    if(q){
      const n=(r.CounterpartyName||'').toLowerCase();
      const fn=(r.Filename||'').toLowerCase();
      if(!n.includes(q)&&!fn.includes(q)) return false;
    }
    return true;
  });
  filtered.sort((a,b)=>{
    if(sortField==='Round'){
      const an=parseInt(a.Round,10)||0, bn=parseInt(b.Round,10)||0;
      return (an-bn)*sortDir;
    }
    const av=(a[sortField]||'').toLowerCase(),bv=(b[sortField]||'').toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  renderThead();
  renderTable();
}

function renderTable(){
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty-state');
  const visTotal = getVisible().length;
  document.getElementById('tbl-meta').textContent = `Showing ${filtered.length.toLocaleString()} of ${visTotal.toLocaleString()} in-process`;

  if(!filtered.length){
    tbody.innerHTML=''; empty.style.display='block'; return;
  }
  empty.style.display='none';

  tbody.innerHTML = filtered.map(r=>{
    const dtc = DT_CLASS[r.DocType]||'b-other';
    const fp = r.FilePath||'';
    return `<tr data-fp="${esc(fp)}" onclick="onRowClick(this)">
      <td title="${esc(r.CounterpartyName)}">${esc(r.CounterpartyName||'—')}</td>
      <td>${badge(r.DocType||'—',dtc)}</td>
      <td>${stagePill(r.Stage)}</td>
      <td>${posPill(r.Position)}</td>
      <td style="font-size:12px;color:var(--text2)">${esc(r.Leverage)||'—'}</td>
      <td style="font-size:12px;color:var(--text3)">${esc(r.Round)||'—'}</td>
      <td style="font-size:12px;color:var(--text3)">${esc(r.Owner)||'—'}</td>
      <td style="font-size:12px;color:var(--text3)">${(r.LastActivity||'').slice(0,10)||'—'}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════════
// DETAIL DRAWER (Stage 2)
// ══════════════════════════════════════════════
// Row click → open the negotiation detail drawer for this FilePath.
function onRowClick(tr){
  openDrawer(tr.getAttribute('data-fp'));
}

function renderBatna(b){
  if(!b || (!b.strength && !b.note)) return '';
  const strength = b.strength || '';
  const cls = ['Strong','Balanced','Weak'].includes(strength) ? 'batna-'+strength : 'batna-default';
  return `<div class="drawer-section">
    <div class="drawer-section-title">BATNA</div>
    <div class="batna-banner ${cls}">
      <div class="batna-strength">${esc(strength)||'—'}</div>
      ${b.note?`<div class="batna-note">${esc(b.note)}</div>`:''}
    </div>
  </div>`;
}

function renderRounds(rounds){
  const list = Array.isArray(rounds)?rounds.slice():[];
  if(!list.length) return '';
  list.sort((a,b)=>((a&&a.n)||0)-((b&&b.n)||0));
  const items = list.map(r=>{
    r=r||{};
    const dir=(r.dir==='sent'||r.dir==='received')?r.dir:'';
    return `<div class="round-item">
      <span class="round-dot ${dir}"></span>
      <div class="round-top">
        <span class="round-n">Round ${esc(String(r.n!=null?r.n:'—'))}</span>
        ${dir?`<span class="round-dir ${dir}">${dir}</span>`:''}
        ${r.date?`<span class="round-date">${esc(r.date)}</span>`:''}
      </div>
      ${r.objective?`<div class="round-obj">${esc(r.objective)}</div>`:''}
      ${r.note?`<div class="round-note">${esc(r.note)}</div>`:''}
      ${r.file?`<div class="round-file">${esc(r.file)}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="drawer-section">
    <div class="drawer-section-title">Rounds</div>
    ${items}
  </div>`;
}

function outcomePill(o){
  const k=(o||'').toUpperCase();
  const cls=['PENDING','WON','MUTUAL','ACCEPTED','LOST'].includes(k)?'outcome-'+k:'outcome-default';
  return `<span class="outcome-pill ${cls}">${esc(o)||'—'}</span>`;
}

function renderObjectives(objs){
  const list = Array.isArray(objs)?objs:[];
  if(!list.length) return '';
  let body='';
  ['T1','T2','T3'].forEach(tier=>{
    const inTier = list.filter(o=>o && o.tier===tier);
    if(!inTier.length) return;
    body += `<div class="obj-tier-hdr"><span class="obj-tier-tag obj-tier-${tier}">${tier}</span></div>`;
    body += inTier.map(o=>`<div class="obj-row tier-${tier}">
      <div class="obj-main">
        <div class="obj-risk">${esc(o.risk)||'—'}</div>
        ${o.goal?`<div class="obj-goal"><span class="arrow">→</span>${esc(o.goal)}</div>`:''}
        ${o.pattern_ref?`<div class="obj-ref">pattern ${esc(o.pattern_ref)}</div>`:''}
      </div>
      <div class="obj-right">${outcomePill(o.outcome)}</div>
    </div>`).join('');
  });
  // Any objectives without a recognized tier
  const untiered = list.filter(o=>o && !['T1','T2','T3'].includes(o.tier));
  if(untiered.length){
    body += `<div class="obj-tier-hdr"><span class="obj-tier-tag obj-tier-T3">Other</span></div>`;
    body += untiered.map(o=>`<div class="obj-row">
      <div class="obj-main">
        <div class="obj-risk">${esc(o.risk)||'—'}</div>
        ${o.goal?`<div class="obj-goal"><span class="arrow">→</span>${esc(o.goal)}</div>`:''}
        ${o.pattern_ref?`<div class="obj-ref">pattern ${esc(o.pattern_ref)}</div>`:''}
      </div>
      <div class="obj-right">${outcomePill(o.outcome)}</div>
    </div>`).join('');
  }
  if(!body) return '';
  return `<div class="drawer-section">
    <div class="drawer-section-title">Objectives</div>
    ${body}
  </div>`;
}

// FilePath of the currently-open drawer (Stage 3b action handlers target this key).
let CURRENT_FP = null;

function openDrawer(fp){
  CURRENT_FP = fp;
  const d = (DETAIL||{})[fp];
  // Header — fall back to catalog row for counterparty/doctype if detail missing.
  const row = getVisible().find(r=>r.FilePath===fp) || {};
  const cp = (d&&d.counterparty) || row.CounterpartyName || '—';
  const dt = (d&&d.doctype) || row.DocType || '';
  document.getElementById('drawer-title').textContent = cp;
  document.getElementById('drawer-sub').innerHTML = dt?badge(dt,DT_CLASS[dt]||'b-other'):'';

  const body = document.getElementById('drawer-body');
  let html;
  if(!d){
    html = `<div class="drawer-empty">No negotiation detail recorded yet for this contract.</div>`;
  } else {
    html = renderBatna(d.batna) + renderRounds(d.rounds) + renderObjectives(d.objectives);

  html += renderDrawerActions();  // Stage 3b — always available, even with no detail entry yet
  body.innerHTML = html;
  body.scrollTop = 0;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

  const roundObj = { n: nextN, date, dir, objective, file, note };
  const roundJson = JSON.stringify(roundObj, null, 2);

  const relayText =
`Log Round: ${meta.counterparty||CURRENT_FP} — Round ${nextN} (${dir})

${roundJson}

// OWNER_HASH + sha256() copied VERBATIM from index.html (identical owner password).
const OWNER_HASH='049282c64821fee3'+'faa9f7247396798f'+'6282acbf14d19ceb'+'9e655c316ab81962';
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// CSV PARSER (verbatim from index.html)
// ══════════════════════════════════════════════
function parseCSV(text){
  const lines=text.split(/\r?\n/);
  if(!lines.length) return [];
  const headers=parseCSVRow(lines[0]);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim(); if(!line) continue;
    const vals=parseCSVRow(line);
    const obj={}; headers.forEach((h,j)=>obj[h.trim()]=vals[j]||'');
    rows.push(obj);
  }
  return rows;
}
function parseCSVRow(line){
  const result=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else cur+=c;
  }
  result.push(cur); return result;
}

function init(){
  const n = getVisible().length;
  document.getElementById('hdr-pill').textContent = n.toLocaleString()+' in-process';
  document.getElementById('footer-note').textContent='In-process loaded '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  buildStats();
  buildFilters();
  go();
}

function showLoadError(){
  document.getElementById('hdr-pill').textContent='Load error';
  const isLocal=window.location.protocol==='file:';
  document.getElementById('stats-row').innerHTML=
    '<div style="grid-column:1/-1;padding:16px;background:var(--red-bg);border:1px solid rgba(220,38,38,.3);border-radius:var(--radius-lg);color:var(--red-text);font-size:13px;line-height:1.7">'
    +(isLocal
      ? '⚠ Cannot load data from a local file. Open via SharePoint URL so the browser can fetch <code>in-process-catalog.csv</code> and <code>in-process-detail.json</code>.'
      : '⚠ Failed to load <code>in-process-catalog.csv</code>. Verify the file is in the same SharePoint folder as this HTML file.')
    +'</div>';
}

// ── Data load: two fetches, both cache-busted (same pattern as index.html) ──
const csvUrl  = new URL('in-process-catalog.csv?t='+Date.now(),window.location.href).href;
const jsonUrl = new URL('in-process-detail.json?t='+Date.now(),window.location.href).href;

// Detail JSON is non-fatal: soft-fail to {} so the page still renders.
const detailFetch = fetch(jsonUrl,{cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .catch(err=>{ console.warn('in-process-detail.json failed to load:',err); return {}; });

// Catalog CSV is required: failure shows the graceful error panel.
const catalogFetch = fetch(csvUrl,{cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); });

Promise.all([catalogFetch,detailFetch])
  .then(([csvText,detailObj])=>{
    CATALOG = parseCSV(csvText);
    DETAIL  = detailObj || {};
    init();
  })
  .catch(err=>{ console.error(err); showLoadError(); });
</script>
