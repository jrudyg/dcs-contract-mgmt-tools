<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract Catalog</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;background:#f5f6f8;color:#1a1d23;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── Header ── */
header{background:#fff;border-bottom:1px solid #e2e5ea;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
.logo svg{color:#2563eb}
.header-right{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;border:1px solid #d1d5db;background:#fff;font-size:13px;color:#374151;cursor:pointer}
.btn:hover{background:#f9fafb}

/* ── Dark theme ── */
body.dark{background:#0f1117;color:#e2e5ea}
body.dark header{background:#1a1d27;border-color:#2a2d3a}
body.dark .logo{color:#e2e5ea}
body.dark .btn{background:#1a1d27;border-color:#2a2d3a;color:#c9cdd6}
body.dark .btn:hover{background:#22263a}
body.dark .stat-card{background:#1a1d27;border-color:#2a2d3a}
body.dark .stat-label{color:#6b7280}
body.dark .stat-value{color:#e2e5ea}
body.dark .stat-value.green{color:#34d399}
body.dark .stat-value.amber{color:#fbbf24}
body.dark .stat-value.red{color:#f87171}
body.dark .search-bar{background:#1a1d27;border-color:#2a2d3a}
body.dark input[type=text]{background:#22263a;border-color:#2a2d3a;color:#e2e5ea}
body.dark input[type=text]:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
body.dark .chip{background:#22263a;border-color:#2a2d3a;color:#c9cdd6}
body.dark .chip:hover{background:#2a3050;border-color:#3b82f6;color:#93c5fd}
body.dark .chip.active{background:#2563eb;border-color:#2563eb;color:#fff}
body.dark .settings-panel{background:#22263a;border-color:#2a2d3a}
body.dark .settings-panel label{color:#9ca3af}
body.dark .hint{color:#4b5563}
body.dark .table-wrap{background:#1a1d27;border-color:#2a2d3a}
body.dark .table-meta{color:#6b7280;border-color:#2a2d3a}
body.dark th{background:#22263a;color:#6b7280;border-color:#2a2d3a}
body.dark td{border-color:#1f2230}
body.dark tr:hover td{background:#22263a}
body.dark tr.exp-red td{background:#2d1515!important}
body.dark tr.exp-red:hover td{background:#3d1a1a!important}
body.dark tr.exp-amber td{background:#2d2010!important}
body.dark tr.exp-amber:hover td{background:#3d2a10!important}
body.dark .contract-card{background:#1a1d27;border-color:#2a2d3a}
body.dark .contract-card.exp-red{background:#2d1515;border-left-color:#f87171}
body.dark .contract-card.exp-amber{background:#2d2010;border-left-color:#fbbf24}
body.dark .card-name{color:#e2e5ea}
body.dark .card-date{color:#4b5563}
body.dark .open-btn{background:#22263a;border-color:#2a2d3a;color:#c9cdd6}
body.dark .open-btn:hover{border-color:#3b82f6;color:#93c5fd;background:#2a3050}
body.dark .empty h3{color:#9ca3af}
body.dark .suggestion-chip{background:#22263a;border-color:#2a2d3a;color:#c9cdd6}
body.dark .suggestion-chip:hover{border-color:#3b82f6;color:#93c5fd;background:#2a3050}
body.dark #footer-date{color:#4b5563}
body.dark .sort-icon.active{color:#60a5fa}
body.dark .fi-pdf{background:#4c1111;color:#f87171}
body.dark .fi-docx,.fi-doc{background:#1e3a5f;color:#93c5fd}
body.dark .fi-msg{background:#3b1f5e;color:#c4b5fd}
body.dark .fi-other{background:#22263a;color:#6b7280}
/* dark badge tints */
body.dark .b-nda{background:#1e3a5f;color:#93c5fd}
body.dark .b-mnda{background:#064e3b;color:#6ee7b7}
body.dark .b-msa{background:#451a03;color:#fcd34d}
body.dark .b-sow{background:#2e1065;color:#c4b5fd}
body.dark .b-sub{background:#450a0a;color:#fca5a5}
body.dark .b-cda,.b-other{background:#1f2230;color:#9ca3af}
body.dark .b-eula,.b-ipa,.b-psa{background:#500724;color:#f9a8d4}
body.dark .b-amendment{background:#431407;color:#fdba74}
body.dark .b-signed{background:#064e3b;color:#6ee7b7}
body.dark .b-unsigned{background:#451a03;color:#fcd34d}
body.dark .b-active{background:#064e3b;color:#6ee7b7}
body.dark .b-pending{background:#1f2230;color:#9ca3af}
body.dark .exp-badge.exp-red{background:#450a0a;color:#fca5a5}
body.dark .exp-badge.exp-amber{background:#451a03;color:#fcd34d}

/* ── Theme toggle button ── */
.theme-btn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-size:16px;transition:background .15s}
.theme-btn:hover{background:#f9fafb}
body.dark .theme-btn{background:#1a1d27;border-color:#2a2d3a}
body.dark .theme-btn:hover{background:#22263a}

/* ── Layout ── */
main{max-width:1400px;margin:0 auto;padding:20px 24px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e2e5ea;border-radius:8px;padding:14px 18px}
.stat-label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:600}
.stat-value.green{color:#059669}
.stat-value.amber{color:#d97706}
.stat-value.red{color:#dc2626}

/* ── Search + Filters ── */
.search-bar{background:#fff;border:1px solid #e2e5ea;border-radius:8px;padding:16px 18px;margin-bottom:12px}
.search-input-wrap{position:relative;margin-bottom:12px}
.search-input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#9ca3af;pointer-events:none}
input[type=text]{width:100%;padding:9px 12px 9px 38px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;color:#1a1d23;outline:none;transition:border-color .15s;background:#fff}
input[type=text]:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-label{font-size:11px;color:#6b7280;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.chip{padding:4px 10px;border-radius:20px;border:1px solid #d1d5db;background:#fff;font-size:12px;color:#374151;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
.chip.active{background:#2563eb;border-color:#2563eb;color:#fff}

/* ── Settings ── */
.settings-panel{background:#f9fafb;border:1px solid #e2e5ea;border-radius:8px;padding:14px 18px;margin-bottom:12px;display:none}
.settings-panel label{font-size:12px;color:#6b7280;display:block;margin-bottom:6px;font-weight:500}
.settings-panel input[type=text]{padding:7px 10px;font-size:12px;font-family:monospace}
.hint{font-size:11px;color:#9ca3af;margin-top:6px}

/* ── Table ── */
.table-wrap{background:#fff;border:1px solid #e2e5ea;border-radius:8px;overflow:hidden}
.table-meta{padding:10px 16px;font-size:12px;color:#6b7280;border-bottom:1px solid #f1f3f5;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.expiry-legend{display:flex;align-items:center;gap:12px;font-size:11px;color:#6b7280}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;background:#f9fafb;border-bottom:1px solid #e5e7eb;cursor:pointer;user-select:none;white-space:nowrap}
th.no-sort{cursor:default}
td{padding:8px 12px;border-bottom:1px solid #f1f3f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}

/* ── Expiry row tints ── */
tr.exp-red td{background:#fff5f5!important}
tr.exp-red:hover td{background:#fee2e2!important}
tr.exp-amber td{background:#fffbeb!important}
tr.exp-amber:hover td{background:#fef3c7!important}

/* ── File type icons ── */
.file-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:-.3px;flex-shrink:0;margin-right:6px}
.fi-pdf{background:#fee2e2;color:#dc2626}
.fi-docx{background:#dbeafe;color:#1d4ed8}
.fi-doc{background:#dbeafe;color:#1d4ed8}
.fi-msg{background:#f3e8ff;color:#7e22ce}
.fi-other{background:#f3f4f6;color:#6b7280}
.filename-cell{display:flex;align-items:center}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.b-nda{background:#dbeafe;color:#1e40af}
.b-mnda{background:#d1fae5;color:#065f46}
.b-msa{background:#fef3c7;color:#92400e}
.b-sow{background:#ede9fe;color:#5b21b6}
.b-sub{background:#fee2e2;color:#991b1b}
.b-cda,.b-other{background:#f3f4f6;color:#374151}
.b-eula,.b-ipa,.b-psa{background:#fce7f3;color:#9d174d}
.b-amendment{background:#ffedd5;color:#9a3412}
.b-signed{background:#d1fae5;color:#065f46}
.b-unsigned{background:#fef3c7;color:#92400e}
.b-active{background:#d1fae5;color:#065f46}
.b-pending{background:#f3f4f6;color:#6b7280}

/* ── Expiry badge ── */
.exp-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.exp-red{background:#fee2e2;color:#991b1b}
.exp-amber{background:#fef3c7;color:#92400e}

/* ── Open button ── */
.open-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;border:1px solid #d1d5db;background:#fff;font-size:12px;color:#374151;cursor:pointer;transition:all .15s}
.open-btn:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff}

/* ── Sort icons ── */
.sort-icon{opacity:.35;font-size:10px;margin-left:3px}
.sort-icon.active{opacity:1;color:#2563eb}

/* ── Empty state ── */
.empty{text-align:center;padding:56px 20px;color:#9ca3af}
.empty-icon{margin:0 auto 16px;display:block;opacity:.35}
.empty h3{font-size:15px;font-weight:500;color:#4b5563;margin-bottom:6px}
.empty p{font-size:13px;margin-bottom:16px}
.suggestions{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px}
.suggestion-chip{padding:4px 12px;border-radius:20px;border:1px solid #d1d5db;background:#fff;font-size:12px;color:#374151;cursor:pointer}
.suggestion-chip:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff}

/* ── Mobile card view ── */
@media(max-width:767px){
  main{padding:12px}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
  .stat-card{padding:10px 12px}
  .stat-value{font-size:20px}
  table{display:none}
  .table-meta{font-size:11px}
  .card-list{display:block}
  .contract-card{background:#fff;border-radius:8px;border:1px solid #e2e5ea;padding:12px 14px;margin-bottom:8px}
  .contract-card.exp-red{border-left:3px solid #dc2626;background:#fff5f5}
  .contract-card.exp-amber{border-left:3px solid #d97706;background:#fffbeb}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
  .card-name{font-weight:500;font-size:14px;color:#1a1d23}
  .card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
  .card-filename{font-size:11px;color:#6b7280;font-family:monospace;display:flex;align-items:center;gap:4px;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-footer{display:flex;align-items:center;justify-content:space-between}
  .card-date{font-size:11px;color:#9ca3af}
}
@media(min-width:768px){
  .card-list{display:none}
}
</style>
</head>

<header>
  <div class="logo">

      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    Contract Catalog
  </div>
  <div class="header-right">
    <span id="hdr-count" style="font-size:12px;color:#6b7280;"></span>
    <button class="theme-btn" onclick="toggleDark()" id="theme-btn" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    <button class="btn" onclick="toggleSettings()" aria-label="Settings">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      Settings
    </button>
  </div>
</header>

<main>
  <div id="settings-panel" class="settings-panel">
    <label>SharePoint document library base URL</label>
    <input type="text" id="sp-base" value="https://diakoniagroupllc.sharepoint.com/sites/ContractManagement/Shared Documents" />
    <p class="hint">Links resolve to: {URL}/{folder}/{vendor}/{filename}?web=1 &nbsp;·&nbsp; Users must be signed into SharePoint.</p>
  </div>

  <div class="stats-row" id="stats"></div>

  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="q" placeholder="Search by counterparty name or filename…" oninput="go()" aria-label="Search contracts"/>
    </div>
    <div class="filters" id="filter-bar"></div>
  </div>

  <div class="table-wrap">
    <div class="table-meta">
      <span id="meta"></span>
      <div class="expiry-legend" id="exp-legend" style="display:none">
        <span><span class="legend-dot" style="background:#dc2626"></span>Expires ≤30 days</span>
        <span><span class="legend-dot" style="background:#d97706"></span>Expires ≤90 days</span>
      </div>
    </div>

    <!-- Desktop table -->
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th style="width:21%" onclick="sortBy('CounterpartyName')">Counterparty <span id="si-CounterpartyName" class="sort-icon active">▲</span></th>
            <th style="width:9%" onclick="sortBy('DocType')">Type <span id="si-DocType" class="sort-icon">↕</span></th>
            <th style="width:9%" class="no-sort">Status</th>
            <th style="width:8%" class="no-sort">Folder</th>
            <th style="width:33%" onclick="sortBy('Filename')">Filename <span id="si-Filename" class="sort-icon">↕</span></th>
            <th style="width:10%" onclick="sortBy('EffectiveDate')">Date <span id="si-EffectiveDate" class="sort-icon">↕</span></th>
            <th style="width:10%" class="no-sort"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div class="card-list" id="card-list"></div>

    <div id="empty" class="empty" style="display:none">
      <svg class="empty-icon" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
      </svg>
      <h3>No contracts found</h3>
      <p id="empty-msg">Try a different search term or clear your filters.</p>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <p style="font-size:11px;color:#9ca3af;text-align:right;margin-top:8px;" id="footer-date"></p>
</main>

name":"9.3.2024","CounterpartyName":"Yoder Services","EffectiveDate":"2026-01-14","ExpirationDate":"","Notes":""},{"ContractLocation":"02 Unsigned","VendorFolder":"Zebra-Fletch","Filename":"Designed Conveyor Systems-NDA-2022-10-18 - signed.pdf","Extension":".pdf","FileCreatedDate":"2026-01-14","DocType":"NDA","HasSignedKeyword":"TRUE","SigningStatus":"Signed","IsAmendment":"FALSE","AmendmentNumber":"","VersionLabel":"","DateInFilename":"2022-10-18","CounterpartyName":"Zebra-Fletch","EffectiveDate":"2026-01-14","ExpirationDate":"","Notes":""},{"ContractLocation":"02 Unsigned","VendorFolder":"Zone 4 Systems Integration and Design","Filename":"Zone 4 - DCS Mutual NDA .pdf","Extension":".pdf","FileCreatedDate":"2026-01-14","DocType":"MNDA","HasSignedKeyword":"FALSE","SigningStatus":"Unsigned","IsAmendment":"FALSE","AmendmentNumber":"","VersionLabel":"","DateInFilename":"","CounterpartyName":"Zone 4 Systems Integration and Design","EffectiveDate":"2026-01-14","ExpirationDate":"","Notes":""}];
const GENERATED = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
document.getElementById('footer-date').textContent = 'Catalog generated ' + GENERATED;

const DT_CLASS={NDA:'b-nda',MNDA:'b-mnda',MSA:'b-msa',SOW:'b-sow',Subcontract:'b-sub',CDA:'b-cda',EULA:'b-eula',IPA:'b-ipa',PSA:'b-psa',Amendment:'b-amendment',Other:'b-other'};
const SUGGEST_MAP={
  'nda':['MNDA','CDA'],'confidential':['NDA','CDA','MNDA'],'master':['MSA'],
  'work':['SOW'],'service':['SOW','PSA'],'sub':['Subcontract'],'eula':['EULA'],
  'software':['EULA','MSA'],'license':['EULA'],'partner':['IPA']
};

let sf='CounterpartyName',sd=1,filtered=[],af={type:'All',status:'All',loc:'All'};

const today=new Date(); today.setHours(0,0,0,0);
function daysTo(s){if(!s)return null;const d=new Date(s);if(isNaN(d))return null;return Math.round((d-today)/86400000)}
function expiryClass(r){const d=daysTo(r.ExpirationDate);if(d===null)return '';if(d<=30)return 'exp-red';if(d<=90)return 'exp-amber';return ''}
function expiryBadge(r){const d=daysTo(r.ExpirationDate);if(d===null||d>90)return '';if(d<=0)return '<span class="exp-badge exp-red">Expired</span>';if(d<=30)return `<span class="exp-badge exp-red">⚠ ${d}d</span>`;return `<span class="exp-badge exp-amber">${d}d</span>`}

function fileIcon(ext){
  const e=(ext||'').toLowerCase();
  if(e==='.pdf')return '<span class="file-icon fi-pdf">PDF</span>';
  if(e==='.docx')return '<span class="file-icon fi-docx">DOC</span>';
  if(e==='.doc')return '<span class="file-icon fi-doc">DOC</span>';
  if(e==='.msg')return '<span class="file-icon fi-msg">MSG</span>';
  return '<span class="file-icon fi-other">—</span>';
}

function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function badge(txt,cls){return`<span class="badge ${cls}">${e(txt)}</span>`}

function spUrl(r){
  const base=(document.getElementById('sp-base').value||'').replace(/\/$/,'');
  return base+'/'+[r.ContractLocation,r.VendorFolder,r.Filename].map(s=>encodeURIComponent(s||'')).join('/')+'?web=1';
}

function toggleSettings(){
  const p=document.getElementById('settings-panel');
  p.style.display=p.style.display==='none'?'block':'none';
}

function buildStats(){
  const signed=DATA.filter(r=>r.SigningStatus==='Signed').length;
  const active=DATA.filter(r=>r.ContractLocation==='01 Active').length;
  const expiring90=DATA.filter(r=>{const d=daysTo(r.ExpirationDate);return d!==null&&d<=90&&d>0}).length;
  const expiring30=DATA.filter(r=>{const d=daysTo(r.ExpirationDate);return d!==null&&d<=30&&d>0}).length;
  const hasExpiry=DATA.some(r=>daysTo(r.ExpirationDate)!==null);

  // Show expiry legend if any expiration data exists
  if(hasExpiry) document.getElementById('exp-legend').style.display='flex';

  const cards=[
    ['Total contracts',DATA.length.toLocaleString(),''],
    ['Signed',signed.toLocaleString(),'green'],
    ['Active folder',active.toLocaleString(),''],
    hasExpiry
      ? ['Expiring ≤90 days',expiring90.toLocaleString(),expiring90>0?(expiring30>0?'red':'amber'):'']
      : ['Doc types',[...new Set(DATA.map(r=>r.DocType).filter(Boolean))].size,'']
  ];
  document.getElementById('stats').innerHTML=cards.map(([l,v,c])=>
    `<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value ${c}">${v}</div></div>`
  ).join('');
  document.getElementById('hdr-count').textContent=DATA.length.toLocaleString()+' contracts';
}

function buildFilters(){
  const types=['All',...new Set(DATA.map(r=>r.DocType).filter(Boolean))].sort((a,b)=>a==='All'?-1:b==='All'?1:a.localeCompare(b));
  let h=`<div class="filter-group"><span class="filter-label">Type</span>`
    +types.map(t=>`<button class="chip${af.type===t?' active':''}" onclick="setF('type','${e(t)}')">${e(t)}</button>`).join('')+'</div>';
  h+=`<div class="filter-group"><span class="filter-label">Status</span>`
    +['All','Signed','Unsigned'].map(s=>`<button class="chip${af.status===s?' active':''}" onclick="setF('status','${s}')">${s}</button>`).join('')+'</div>';
  h+=`<div class="filter-group"><span class="filter-label">Folder</span>`
    +[['All','All'],['01 Active','Active'],['02 Unsigned','Pending']].map(([v,l])=>`<button class="chip${af.loc===v?' active':''}" onclick="setF('loc','${e(v)}')">${l}</button>`).join('')+'</div>';
  document.getElementById('filter-bar').innerHTML=h;
}

function setF(k,v){af[k]=v;buildFilters();go()}

function sortBy(f){sf===f?sd*=-1:(sf=f,sd=1);updateSortIcons();go()}

function updateSortIcons(){
  ['CounterpartyName','DocType','Filename','EffectiveDate'].forEach(f=>{
    const el=document.getElementById('si-'+f);if(!el)return;
    if(f===sf){el.className='sort-icon active';el.textContent=sd===1?'▲':'▼'}
    else{el.className='sort-icon';el.textContent='↕'}
  });
}

function getSuggestions(q){
  if(!q||q.length<2)return[];
  const ql=q.toLowerCase();
  const types=[];
  for(const [k,v] of Object.entries(SUGGEST_MAP)){
    if(ql.includes(k))v.forEach(t=>{if(!types.includes(t))types.push(t)});
  }
  // Also suggest counterparty names that partially match
  const names=[...new Set(DATA.map(r=>r.CounterpartyName).filter(n=>n&&n.toLowerCase().includes(ql)))].slice(0,3);
  return{types,names};
}

function go(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  filtered=DATA.filter(r=>{
    if(af.type!=='All'&&r.DocType!==af.type)return false;
    if(af.status!=='All'&&r.SigningStatus!==af.status)return false;
    if(af.loc!=='All'&&r.ContractLocation!==af.loc)return false;
    if(q){
      const n=(r.CounterpartyName||'').toLowerCase();
      const fn=(r.Filename||'').toLowerCase();
      if(!n.includes(q)&&!fn.includes(q))return false;
    }
    return true;
  });
  filtered.sort((a,b)=>{
    const av=(a[sf]||'').toLowerCase(),bv=(b[sf]||'').toLowerCase();
    return av<bv?-sd:av>bv?sd:0;
  });
  render(q);
}

function render(q){
  const tbody=document.getElementById('tbody');
  const cardList=document.getElementById('card-list');
  const empty=document.getElementById('empty');
  const meta=document.getElementById('meta');
  const LIMIT=500;

  meta.textContent=`Showing ${Math.min(filtered.length,LIMIT).toLocaleString()} of ${filtered.length.toLocaleString()} results · ${DATA.length.toLocaleString()} total`;

  if(!filtered.length){
    tbody.innerHTML='';cardList.innerHTML='';
    empty.style.display='block';
    const sugg=getSuggestions(q||'');
    let msg='Try a different search term or clear your filters.';
    if(sugg.types&&sugg.types.length){
      msg=`No results for that term — did you mean:`;
      document.getElementById('suggestions').innerHTML=
        sugg.types.map(t=>`<button class="suggestion-chip" onclick="setF('type','${t}');document.getElementById('q').value='';go()">${t}</button>`).join('')
        +sugg.names.map(n=>`<button class="suggestion-chip" onclick="document.getElementById('q').value='${e(n)}';go()">${e(n)}</button>`).join('');
    } else {
      document.getElementById('suggestions').innerHTML='';
    }
    document.getElementById('empty-msg').textContent=msg;
    return;
  }
  empty.style.display='none';

  const slice=filtered.slice(0,LIMIT);
  const overflow=filtered.length>LIMIT?`<tr><td colspan="7" style="text-align:center;padding:12px;font-size:12px;color:#9ca3af">Refine search to see all ${filtered.length.toLocaleString()} — showing first ${LIMIT}</td></tr>`:'';

  // Desktop table
  tbody.innerHTML=slice.map(r=>{
    const ec=expiryClass(r);
    const dtc=DT_CLASS[r.DocType]||'b-other';
    const stc=r.SigningStatus==='Signed'?'b-signed':'b-unsigned';
    const locB=r.ContractLocation==='01 Active'?badge('Active','b-active'):badge('Pending','b-pending');
    const fn=r.Filename||'';
    const trunc=fn.length>48?fn.slice(0,45)+'…':fn;
    const expB=expiryBadge(r);
    const date=(r.EffectiveDate||'').slice(0,10)||'—';
    return`<tr class="${ec}">
      <td title="${e(r.CounterpartyName)}">${e(r.CounterpartyName||'—')}</td>
      <td>${badge(r.DocType||'—',dtc)}</td>
      <td>${badge(r.SigningStatus||'—',stc)}</td>
      <td>${locB}</td>
      <td title="${e(fn)}" style="font-family:monospace;font-size:11px;color:#4b5563;">
        <div class="filename-cell">${fileIcon(r.Extension)}${e(trunc)}${expB?'&nbsp;'+expB:''}</div>
      </td>
      <td style="font-size:12px;color:#6b7280;">${date}</td>
      <td><a href="${spUrl(r)}" target="_blank" rel="noopener noreferrer" class="open-btn">
        <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Open
      </a></td>
    </tr>`;
  }).join('')+overflow;

  // Mobile cards
  cardList.innerHTML=slice.map(r=>{
    const ec=expiryClass(r);
    const dtc=DT_CLASS[r.DocType]||'b-other';
    const stc=r.SigningStatus==='Signed'?'b-signed':'b-unsigned';
    const locB=r.ContractLocation==='01 Active'?badge('Active','b-active'):badge('Pending','b-pending');
    const fn=r.Filename||'';
    const trunc=fn.length>50?fn.slice(0,47)+'…':fn;
    const expB=expiryBadge(r);
    const date=(r.EffectiveDate||'').slice(0,10)||'—';
    return`<div class="contract-card ${ec}">
      <div class="card-top">
        <span class="card-name">${e(r.CounterpartyName||'—')}</span>
        ${expB||''}
      </div>
      <div class="card-badges">
        ${badge(r.DocType||'—',dtc)}
        ${badge(r.SigningStatus||'—',stc)}
        ${locB}
      </div>
      <div class="card-filename">${fileIcon(r.Extension)}<span style="overflow:hidden;text-overflow:ellipsis;">${e(trunc)}</span></div>
      <div class="card-footer">
        <span class="card-date">${date}</span>
        <a href="${spUrl(r)}" target="_blank" rel="noopener noreferrer" class="open-btn">
          <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
          Open
        </a>
      </div>
    </div>`;
  }).join('')+(filtered.length>LIMIT?`<p style="text-align:center;padding:12px;font-size:12px;color:#9ca3af">Showing first ${LIMIT} of ${filtered.length.toLocaleString()}</p>`:'');
}

// Keyboard shortcut: / to focus search
document.addEventListener('keydown',ev=>{
  if(ev.key==='/'&&document.activeElement!==document.getElementById('q')){
    ev.preventDefault();document.getElementById('q').focus();
  }
});

// ── Dark mode ──
function toggleDark(){
  const dark=document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
  try{localStorage.setItem('cm-theme',dark?'dark':'light')}catch(e){}
}
// Honour OS preference and saved choice
(function(){
  let saved;try{saved=localStorage.getItem('cm-theme')}catch(e){}
  const prefersDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(saved==='dark'||(saved===null&&prefersDark)){
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent='☀️';
  }
})();

buildStats();
buildFilters();
go();
</script>
</body>
</html>
